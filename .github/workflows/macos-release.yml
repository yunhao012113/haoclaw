name: macOS Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish to GitHub Releases. Leave empty to only build artifacts.
        required: false
        type: string
      draft:
        description: Create the GitHub Release as a draft.
        required: false
        default: false
        type: boolean

concurrency:
  group: macos-release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  package-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          use-sticky-disk: "false"
          frozen-lockfile: "false"

      - name: Show toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          set -euo pipefail
          raw="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.release_tag }}" ]]; then
            raw="${{ inputs.release_tag }}"
          fi
          echo "version=${raw#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve signing and notarization mode
        shell: bash
        env:
          MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
          NOTARYTOOL_PROFILE: ${{ secrets.NOTARYTOOL_PROFILE }}
          NOTARYTOOL_KEY: ${{ secrets.NOTARYTOOL_KEY }}
          NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
          NOTARYTOOL_ISSUER: ${{ secrets.NOTARYTOOL_ISSUER }}
        run: |
          set -euo pipefail
          skip_notarize=1
          notarize_reason="Building unsigned release assets."

          if [[ -n "${NOTARYTOOL_PROFILE}" ]] || [[ -n "${NOTARYTOOL_KEY}" && -n "${NOTARYTOOL_KEY_ID}" && -n "${NOTARYTOOL_ISSUER}" ]]; then
            skip_notarize=0
            notarize_reason="Apple notarization enabled."
          fi

          {
            echo "SKIP_NOTARIZE=${skip_notarize}"
            echo "NOTARIZE_SUMMARY=${notarize_reason}"
          } >> "$GITHUB_ENV"

      - name: Package macOS desktop client
        env:
          ALLOW_ADHOC_SIGNING: "1"
          APP_VERSION: ${{ steps.release_version.outputs.version }}
          BUILD_CONFIG: release
          BUILD_ARCHS: all
          HAOCLAW_A2UI_ALLOW_STUB: "1"
          SKIP_DMG_STYLE: "1"
          SKIP_NOTARIZE: ${{ env.SKIP_NOTARIZE }}
          SPARKLE_FEED_URL: "https://raw.githubusercontent.com/yunhao012113/haoclaw/main/appcast.xml"
          SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
          INSTALLER_SIGN_IDENTITY: ${{ secrets.MAC_INSTALLER_SIGN_IDENTITY }}
          NOTARYTOOL_PROFILE: ${{ secrets.NOTARYTOOL_PROFILE }}
          NOTARYTOOL_KEY: ${{ secrets.NOTARYTOOL_KEY }}
          NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
          NOTARYTOOL_ISSUER: ${{ secrets.NOTARYTOOL_ISSUER }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/package-mac-dist.sh 2>&1 | tee package-macos.log

      - name: Show macOS packaging log tail on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-macos.log ]]; then
            echo "---- package-macos.log (tail -200) ----"
            tail -n 200 package-macos.log
          fi

      - name: Smoke test macOS installer outputs
        shell: bash
        run: |
          set -euo pipefail
          pkg_path="$(find dist -maxdepth 1 -name 'Haoclaw-*.pkg' -print -quit)"
          if [[ -z "${pkg_path}" ]]; then
            echo "Missing pkg artifact" >&2
            exit 1
          fi

          fake_existing_dir="$HOME/Downloads/haoclaw-test"

          rm -rf /Applications/Haoclaw.app \
            "$HOME/Applications/Haoclaw.app" \
            "$HOME/Desktop/Haoclaw.app" \
            "$HOME/Desktop/打开 Haoclaw.command" \
            "${fake_existing_dir}"

          mkdir -p "${fake_existing_dir}"
          cp -R "dist/Haoclaw.app" "${fake_existing_dir}/Haoclaw.app"

          sudo installer -pkg "${pkg_path}" -target /

          [[ -d /Applications/Haoclaw.app ]]
          [[ -d "$HOME/Applications/Haoclaw.app" ]]
          [[ -e "$HOME/Desktop/Haoclaw.app" || -e "$HOME/Desktop/打开 Haoclaw.command" ]]
          [[ -d "${fake_existing_dir}/Haoclaw.app" ]]

      - name: Upload macOS packaging log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: haoclaw-macos-log-${{ github.ref_name || github.run_id }}
          path: package-macos.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize packaged assets
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## macOS package"
            echo ""
            echo "- ${NOTARIZE_SUMMARY}"
            echo "- Assets:"
            find dist -maxdepth 1 \( -name 'Haoclaw-*.zip' -o -name 'Haoclaw-*.dmg' -o -name 'Haoclaw-*.pkg' -o -name 'Haoclaw-*.dSYM.zip' \) -print | sed 's#^#  - #'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: haoclaw-macos-${{ github.ref_name || github.run_id }}
          path: |
            dist/Haoclaw-*.zip
            dist/Haoclaw-*.dmg
            dist/Haoclaw-*.pkg
            dist/Haoclaw-*.dSYM.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          generate_release_notes: true
          files: |
            dist/Haoclaw-*.zip
            dist/Haoclaw-*.dmg
            dist/Haoclaw-*.pkg
