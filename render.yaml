services:
  - type: web
    name: haoclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: HAOCLAW_STATE_DIR
        value: /data/.haoclaw
      - key: HAOCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: HAOCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: haoclaw-data
      mountPath: /data
      sizeGB: 1
